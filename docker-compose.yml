# Local development stack:
# - backend API (Go)
# - frontend app (Next.js)
# Values are read from shell env or .env.docker when using --env-file.
services:
  backend:
    build:
      context: /home/varun/personal/sync-audio-platforms-go/backend
      dockerfile: Dockerfile
    container_name: sync-audio-backend
    init: true
    stop_signal: SIGTERM
    stop_grace_period: 20s
    environment:
      # Backend runtime config (safe defaults for local development only).
      APP_ENV: ${APP_ENV:-development}
      PORT: ${PORT:-8080}
      ALLOWED_ORIGIN: ${ALLOWED_ORIGIN:-http://localhost:3000}
      STORE_PROVIDER: ${STORE_PROVIDER:-sqlite}
      SQLITE_PATH: ${SQLITE_PATH:-/tmp/sync-audio-platforms.db}
      SESSION_HMAC_KEY: ${SESSION_HMAC_KEY:-replace-with-32-byte-minimum-secret}
      TOKEN_ENCRYPTION_KEY: ${TOKEN_ENCRYPTION_KEY:-replace-with-base64-encoded-32-byte-key}
      FIRESTORE_PROJECT_ID: ${FIRESTORE_PROJECT_ID:-your-gcp-project-id}
      DEFAULT_RATE_LIMIT_PER_MIN: ${DEFAULT_RATE_LIMIT_PER_MIN:-120}
    ports:
      - "8080:8080"

  frontend:
    build:
      context: /home/varun/personal/sync-audio-platforms-go/frontend
      dockerfile: Dockerfile
    container_name: sync-audio-frontend
    init: true
    stop_signal: SIGTERM
    stop_grace_period: 20s
    environment:
      # Frontend points browser calls to backend on localhost.
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8080}
    ports:
      - "3000:3000"
    depends_on:
      - backend

